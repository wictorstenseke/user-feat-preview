name: Mark Issue as Merged

on:
  pull_request:
    types: [closed]

jobs:
  mark-merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Get PR number and extract issue number
        id: pr-info
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          # Look for "Closes #123" or similar patterns
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(Closes|Fixes|Resolves)\s+#\K\d+' | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            # Fallback: use the PR number itself as a reference
            ISSUE_NUM=${{ github.event.pull_request.number }}
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Call webhook to update status
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PREVIEW_WEBHOOK_SECRET }}" \
            -d '{
              "prNumber": ${{ steps.pr-info.outputs.issue_number }},
              "status": "merged"
            }' \
            ${{ secrets.PREVIEW_WEBHOOK_URL }}/mark-merged
        continue-on-error: true

      - name: Update GitHub issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.pr-info.outputs.issue_number }};
            try {
              github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['cf:public', 'cf:status/merged']
              });
            } catch (error) {
              console.log('Could not update issue labels:', error);
            }
