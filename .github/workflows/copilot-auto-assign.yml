name: Copilot Auto Assign

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot on public feedback issues
        uses: actions/github-script@v7
        env:
          COPILOT_ASSIGN_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info("No issue in payload. Skipping.");
              return;
            }

            if (!process.env.COPILOT_ASSIGN_TOKEN) {
              core.setFailed("Missing required secret: COPILOT_ASSIGN_TOKEN");
              return;
            }

            const labels = (issue.labels || [])
              .map((label) => (typeof label === "string" ? label : label.name))
              .filter(Boolean);

            if (!labels.includes("cf:public")) {
              core.info(`Issue #${issue.number} is not a public feedback issue. Skipping.`);
              return;
            }

            const existingAssignees = (issue.assignees || [])
              .map((assignee) => assignee.login.toLowerCase());

            if (existingAssignees.some((login) => login.includes("copilot"))) {
              core.info(`Issue #${issue.number} already has a Copilot assignee. Skipping.`);
              return;
            }

            const { owner, repo } = context.repo;
            const baseBranch = context.payload.repository?.default_branch ?? "main";

            try {
              await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
                owner,
                repo,
                issue_number: issue.number,
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: `${owner}/${repo}`,
                  base_branch: baseBranch,
                  custom_instructions: "",
                },
                headers: {
                  accept: "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                },
              });
            } catch (error) {
              const err = error;
              if (typeof err === "object" && err && "status" in err) {
                const status = err.status;
                if (status === 401 || status === 403) {
                  core.setFailed(
                    `Copilot assignment failed with ${status}. Check COPILOT_ASSIGN_TOKEN permissions and Copilot assignment access for this repository.`
                  );
                  return;
                }
                core.setFailed(`Copilot assignment API error: HTTP ${status}`);
                return;
              }

              core.setFailed(`Copilot assignment failed: ${String(error)}`);
              return;
            }

            core.info(`Assigned copilot-swe-agent[bot] to issue #${issue.number}.`);
